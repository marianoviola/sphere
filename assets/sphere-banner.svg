<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sphere: a constellation of spheres">
  <defs>
    <radialGradient id="sphere" cx="33%" cy="27%" r="78%">
      <stop offset="0%" stop-color="#f8f1f5"/>
      <stop offset="47%" stop-color="#8a5a7d"/>
      <stop offset="100%" stop-color="#3d2235"/>
    </radialGradient>
    <g id="orb">
      <circle r="58" fill="url(#sphere)"/>
      <ellipse rx="21" ry="58" fill="none" stroke="#ffffff" stroke-opacity="0.34" stroke-width="2"/>
      <ellipse rx="58" ry="21" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      <circle r="58" fill="none" stroke="#000000" stroke-opacity="0.14" stroke-width="1"/>
    </g>
  </defs>

  <rect width="1200" height="300" fill="#16131c"/>

  <g fill="#8a5a7d" opacity="0.36">
    <circle cx="120" cy="70" r="1.6"/>
    <circle cx="650" cy="60" r="1.6"/>
    <circle cx="880" cy="245" r="1.6"/>
    <circle cx="1150" cy="150" r="1.6"/>
    <circle cx="320" cy="250" r="1.4"/>
  </g>

  <g stroke="#8a5a7d" stroke-width="1.4" opacity="0.32">
    <line x1="200" y1="150" x2="400" y2="92"/>
    <line x1="400" y1="92" x2="545" y2="205"/>
    <line x1="400" y1="92" x2="775" y2="140"/>
    <line x1="775" y1="140" x2="985" y2="92"/>
    <line x1="775" y1="140" x2="1065" y2="208"/>
    <line x1="985" y1="92" x2="1065" y2="208"/>
    <line x1="200" y1="150" x2="545" y2="205"/>
  </g>

  <use href="#orb" transform="translate(200,150) scale(1.207)"/>
  <use href="#orb" transform="translate(400,92) scale(0.586)"/>
  <use href="#orb" transform="translate(545,205) scale(0.414)"/>
  <use href="#orb" transform="translate(775,140) scale(0.793)"/>
  <use href="#orb" transform="translate(985,92) scale(0.517)"/>
  <use href="#orb" transform="translate(1065,208) scale(0.655)"/>
</svg>
