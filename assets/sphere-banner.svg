<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sphere banner: a constellation of wireframe spheres">
  <defs>
    <g id="orb" fill="none" stroke="#EAE6DD" stroke-width="2" vector-effect="non-scaling-stroke">
      <circle cx="0" cy="0" r="100"/>
      <ellipse cx="0" cy="0" rx="100" ry="30"/>
      <ellipse cx="0" cy="0" rx="30" ry="100"/>
    </g>
  </defs>

  <rect width="1200" height="300" fill="#0B0E12"/>

  <!-- faint stars -->
  <g fill="#EAE6DD">
    <circle cx="120" cy="60" r="1.6" opacity="0.4"/>
    <circle cx="300" cy="250" r="1.6" opacity="0.35"/>
    <circle cx="650" cy="60" r="1.6" opacity="0.4"/>
    <circle cx="840" cy="240" r="1.6" opacity="0.35"/>
    <circle cx="1140" cy="150" r="1.6" opacity="0.4"/>
    <circle cx="500" cy="120" r="1.4" opacity="0.3"/>
  </g>

  <!-- relation lines (constellation) -->
  <g stroke="#EAE6DD" stroke-width="1.4" opacity="0.32">
    <line x1="190" y1="150" x2="400" y2="95"/>
    <line x1="400" y1="95" x2="560" y2="215"/>
    <line x1="400" y1="95" x2="760" y2="140"/>
    <line x1="560" y1="215" x2="760" y2="140"/>
    <line x1="940" y1="90" x2="1060" y2="205"/>
    <line x1="940" y1="90" x2="1120" y2="95"/>
  </g>
  <line x1="760" y1="140" x2="940" y2="90" stroke="#FF4A1C" stroke-width="1.6" opacity="0.8"/>

  <!-- spheres -->
  <g style="color:#EAE6DD">
    <use href="#orb" transform="translate(190,150) scale(0.66)"/>
    <use href="#orb" transform="translate(400,95) scale(0.34)"/>
    <use href="#orb" transform="translate(560,215) scale(0.24)"/>
    <use href="#orb" transform="translate(760,140) scale(0.30)"/>
    <use href="#orb" transform="translate(940,90) scale(0.46)"/>
    <use href="#orb" transform="translate(1060,205) scale(0.30)"/>
    <use href="#orb" transform="translate(1120,95) scale(0.16)"/>
  </g>

  <!-- accent nodes -->
  <circle cx="190" cy="84" r="5" fill="#FF4A1C"/>
  <circle cx="940" cy="90" r="5" fill="#FF4A1C"/>
</svg>
