<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sphere">
  <defs>
    <radialGradient id="glow" cx="72%" cy="34%" r="74%">
      <stop offset="0%" stop-color="#0d2236"/>
      <stop offset="52%" stop-color="#05101c"/>
      <stop offset="100%" stop-color="#02050b"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#02050b"/>
  <rect width="1200" height="630" fill="url(#glow)" opacity=".9"/>

  <!-- Faint depth stars -->
  <g fill="#f7fbff">
    <circle cx="180" cy="120" r="1.6" opacity=".5"/>
    <circle cx="320" cy="430" r="1.2" opacity=".4"/>
    <circle cx="560" cy="90" r="1.4" opacity=".45"/>
    <circle cx="1080" cy="150" r="1.6" opacity=".5"/>
    <circle cx="1140" cy="520" r="1.2" opacity=".4"/>
    <circle cx="470" cy="540" r="1.3" opacity=".4"/>
  </g>

  <!-- Wireframe sphere field (current vector design language) -->
  <g fill="none" stroke-linecap="round">
    <path d="M720 150 870 300 1050 470" stroke="#f7fbff" stroke-width="1" opacity=".18"/>

    <circle cx="870" cy="300" r="150" stroke="#f7fbff" stroke-width="2" opacity=".82"/>
    <ellipse cx="870" cy="300" rx="150" ry="48" stroke="#78f2ff" stroke-width="1.4" opacity=".5" transform="rotate(-16 870 300)"/>
    <ellipse cx="870" cy="300" rx="56" ry="150" stroke="#f7fbff" stroke-width="1.1" opacity=".26" transform="rotate(20 870 300)"/>

    <circle cx="1052" cy="468" r="82" stroke="#f7fbff" stroke-width="1.4" opacity=".4"/>
    <ellipse cx="1052" cy="468" rx="82" ry="27" stroke="#78f2ff" stroke-width="1" opacity=".34" transform="rotate(26 1052 468)"/>

    <circle cx="722" cy="150" r="46" stroke="#78f2ff" stroke-width="1.3" opacity=".5"/>
  </g>

  <!-- Fragments inside the main globe -->
  <g fill="#f7fbff">
    <circle cx="845" cy="278" r="2.4" opacity=".7"/>
    <circle cx="905" cy="322" r="2" opacity=".55"/>
    <circle cx="862" cy="340" r="1.8" opacity=".5"/>
  </g>

  <!-- Wordmark -->
  <g>
    <circle cx="86" cy="556" r="13" fill="none" stroke="#f7fbff" stroke-width="2"/>
    <ellipse cx="86" cy="556" rx="13" ry="4.4" fill="none" stroke="#78f2ff" stroke-width="1.4"/>
    <text x="116" y="567" fill="#f7fbff" font-family="IBM Plex Mono, SFMono-Regular, ui-monospace, Menlo, monospace" font-size="40" font-weight="500" letter-spacing="-1">Sphere</text>
  </g>
</svg>
